name: build & publish

on:
  push:
    branches: [main]
    tags:     ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # sourcelink needs full history

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore JackcessDotNet.slnx

      - name: Build
        run: dotnet build JackcessDotNet.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test JackcessDotNet.slnx --configuration Release --no-build --verbosity normal

      - name: Upload package artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: nupkg
          path: |
            artifacts/*.nupkg
            artifacts/*.snupkg
          if-no-files-found: error

  publish:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: windows-latest
    environment: nuget   # optional GitHub Environment with manual approval
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: nupkg
          path: artifacts

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Push to nuget.org
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          dotnet nuget push artifacts/*.nupkg `
              --api-key $env:NUGET_API_KEY `
              --source https://api.nuget.org/v3/index.json `
              --skip-duplicate
